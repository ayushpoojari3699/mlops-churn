name: CI - MLOps Churn API

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn joblib pandas scikit-learn mlflow

      - name: API import check
        run: |
          python - << 'EOF'
          from api.main import app
          print("API imported successfully")
          EOF

      - name: Docker build
        run: |
          docker build -t mlops-churn-test .